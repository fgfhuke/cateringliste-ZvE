<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Catering Liste</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ── Tokens ── */
  :root {
    --bg:        #0f0f0e;
    --surface:   #1a1a18;
    --surface2:  #222220;
    --border:    #2e2e2b;
    --border2:   #3a3a36;
    --text:      #e8e6df;
    --muted:     #7a7870;
    --accent:    #d4a843;
    --accent2:   #b8922e;
    --green:     #4a9e6b;
    --green-bg:  #1a2e22;
    --red:       #c0504a;
    --mono:      'DM Mono', monospace;
    --sans:      'DM Sans', sans-serif;
    --r:         6px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Login ── */
  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 24px;
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px 32px;
    width: 100%;
    max-width: 360px;
  }

  .login-logo {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .login-title {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 28px;
    color: var(--text);
  }

  /* ── Forms ── */
  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  input[type=text], input[type=password], input[type=date], select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--r);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  input:focus, select:focus { border-color: var(--accent); }

  .field { margin-bottom: 16px; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    border: none;
    border-radius: var(--r);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    padding: 10px 18px;
    cursor: pointer;
    transition: opacity 0.15s, background 0.15s;
    white-space: nowrap;
  }
  .btn:active { opacity: 0.8; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-primary { background: var(--accent); color: #1a1200; width: 100%; padding: 12px; font-size: 15px; }
  .btn-primary:hover:not(:disabled) { background: var(--accent2); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--border2); }
  .btn-danger { background: transparent; color: var(--red); border: 1px solid var(--border); }
  .btn-sm { padding: 6px 12px; font-size: 13px; }
  .btn-icon { padding: 8px; background: transparent; color: var(--muted); border: none; font-size: 18px; cursor: pointer; }
  .btn-icon:hover { color: var(--text); }

  /* ── App Layout ── */
  #app { display: none; min-height: 100dvh; flex-direction: column; }
  #app.active { display: flex; }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    height: 52px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-title {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.08em;
    color: var(--accent);
    text-transform: uppercase;
    flex: 1;
  }

  .topbar-date {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted);
  }

  /* ── Tabs ── */
  .tabs {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    padding: 0 16px;
    gap: 0;
  }

  .tab {
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    padding: 12px 16px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    user-select: none;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }

  /* ── Panel ── */
  .panel { display: none; flex: 1; overflow-y: auto; }
  .panel.active { display: block; }

  .content { padding: 16px; max-width: 680px; margin: 0 auto; }

  /* ── Datum-Leiste ── */
  .date-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .date-bar label { margin: 0; white-space: nowrap; }
  .date-bar input { flex: 1; }

  /* ── Suchfeld ── */
  .search-wrap {
    position: relative;
    margin-bottom: 12px;
  }
  .search-wrap input { padding-left: 36px; }
  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 15px;
    pointer-events: none;
  }

  /* ── Personen-Liste ── */
  .personen-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .person-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: var(--r);
    border: 1px solid transparent;
    cursor: pointer;
    transition: background 0.1s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .person-row:hover { background: var(--surface); }
  .person-row.checked { background: var(--green-bg); border-color: #2a4a36; }

  .checkbox {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    border: 1.5px solid var(--border2);
    background: var(--surface2);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
    font-size: 13px;
  }
  .person-row.checked .checkbox {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }

  .person-name {
    font-size: 15px;
    font-weight: 400;
    flex: 1;
  }
  .person-row.checked .person-name { color: #a0c8b0; }

  .person-abt {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
  }

  /* ── Zähler ── */
  .count-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .count-num {
    font-family: var(--mono);
    font-size: 24px;
    font-weight: 500;
    color: var(--accent);
  }

  .count-label { font-size: 12px; color: var(--muted); }

  /* ── Speichern-Leiste ── */
  .save-bar {
    position: sticky;
    bottom: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .save-status {
    flex: 1;
    font-size: 13px;
    color: var(--muted);
    font-family: var(--mono);
  }
  .save-status.ok { color: var(--green); }
  .save-status.err { color: var(--red); }

  /* ── Neue Person ── */
  .add-person-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 16px;
    margin-bottom: 16px;
    display: none;
  }
  .add-person-card.open { display: block; }
  .add-person-card .row { display: flex; gap: 10px; }
  .add-person-card .row .field { flex: 1; }

  /* ── Export / Übersicht ── */
  .monat-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .export-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .export-table th {
    text-align: left;
    font-weight: 500;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
  }
  .export-table td {
    padding: 9px 10px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .export-table tr:last-child td { border-bottom: none; }
  .export-table .tage-pills { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag-pill {
    font-family: var(--mono);
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 2px 6px;
    color: var(--muted);
  }
  .anzahl-badge {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text);
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Spinner ── */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    color: var(--red);
    font-size: 13px;
    margin-top: 8px;
    min-height: 20px;
  }

  /* ── Import ── */
  .import-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 16px;
    margin-bottom: 12px;
    display: none;
  }
  .import-card.open { display: block; }

  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--r);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    resize: vertical;
    min-height: 140px;
    transition: border-color 0.15s;
    line-height: 1.6;
  }
  textarea:focus { border-color: var(--accent); }

  .import-preview {
    margin-top: 12px;
    display: none;
  }
  .import-preview.show { display: block; }
  .preview-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 13px;
  }
  .preview-row.ok   { color: var(--text); }
  .preview-row.dup  { color: var(--muted); text-decoration: line-through; }
  .preview-row.err  { color: var(--red); }
  .preview-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .preview-dot.ok  { background: var(--green); }
  .preview-dot.dup { background: var(--border2); }
  .preview-dot.err { background: var(--red); }
  .import-summary {
    font-size: 12px;
    color: var(--muted);
    margin: 8px 0 12px;
    font-family: var(--mono);
  }

  /* ── Trennlinie ── */
  .section-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 2px 6px;
  }
</style>
</head>
<body>

<!-- ══ LOGIN ══════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Film Set</div>
    <div class="login-title">Catering Liste</div>
    <div class="field">
      <label for="pw-input">Passwort</label>
      <input type="password" id="pw-input" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="error-msg" id="login-error"></div>
    <br>
    <button class="btn btn-primary" id="login-btn" onclick="login()">Anmelden</button>
  </div>
</div>

<!-- ══ APP ════════════════════════════════════════════════ -->
<div id="app">
  <div class="topbar">
    <div class="topbar-title">⬛ Catering</div>
    <div class="topbar-date" id="topbar-date"></div>
    <button class="btn-icon" onclick="logout()" title="Abmelden">⏏</button>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="anwesenheit">Anwesenheit</div>
    <div class="tab" data-tab="personen">Personen</div>
    <div class="tab" data-tab="export">Übersicht</div>
  </div>

  <!-- ── TAB: ANWESENHEIT ── -->
  <div class="panel active content" id="tab-anwesenheit">
    <br>
    <div class="date-bar">
      <label>Datum</label>
      <input type="date" id="datum-input" onchange="datumWechseln()">
      <button class="btn btn-ghost btn-sm" onclick="heuteDatum()">Heute</button>
    </div>

    <div class="count-bar">
      <div>
        <div class="count-num" id="count-anwesend">0</div>
        <div class="count-label">Anwesend heute</div>
      </div>
      <div style="text-align:right">
        <div class="count-num" id="count-gesamt" style="color:var(--muted)">0</div>
        <div class="count-label">Personen total</div>
      </div>
    </div>

    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="suche" placeholder="Name suchen…" oninput="filtere()">
    </div>

    <div class="personen-list" id="personen-list"></div>

    <div class="save-bar">
      <div class="save-status" id="save-status">Nicht gespeichert</div>
      <button class="btn btn-primary btn-sm" id="save-btn" onclick="speichern()">Speichern</button>
    </div>
  </div>

  <!-- ── TAB: PERSONEN ── -->
  <div class="panel content" id="tab-personen">
    <br>
    <!-- Import-Block -->
    <div class="import-card" id="import-card">
      <div class="section-title">Liste einfügen</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.6">
        Ein Eintrag pro Zeile: <span style="font-family:var(--mono);color:var(--text)">Nachname, Vorname</span> oder <span style="font-family:var(--mono);color:var(--text)">Nachname, Vorname;Position</span><br>
        Tab-Trennung (Excel-Kopie) wird auch erkannt.
      </div>
      <textarea id="import-text" placeholder="Mustermann, Max&#10;Schmidt, Anna;Regie&#10;Müller, Peter	Ton" oninput="importVorschau()"></textarea>
      <div class="import-preview" id="import-preview">
        <div class="import-summary" id="import-summary"></div>
        <div id="import-preview-list"></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-primary btn-sm" id="import-btn" onclick="importDurchfuehren()" disabled>Importieren</button>
        <button class="btn btn-ghost btn-sm" onclick="toggleImportCard()">Abbrechen</button>
      </div>
      <div class="error-msg" id="import-error"></div>
    </div>

    <button class="btn btn-ghost" id="import-toggle-btn" onclick="toggleImportCard()" style="width:100%;margin-bottom:8px">
      ↓ Liste importieren (mehrere auf einmal)
    </button>

    <div class="add-person-card" id="add-card">
      <div class="section-title">Neue Person</div>
      <div class="row">
        <div class="field">
          <label>Nachname</label>
          <input type="text" id="new-nachname" placeholder="Mustermann">
        </div>
        <div class="field">
          <label>Vorname</label>
          <input type="text" id="new-vorname" placeholder="Max">
        </div>
      </div>
      <div class="field">
        <label>Position / Abteilung</label>
        <input type="text" id="new-abt" placeholder="z.B. Kameraassistenz">
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary btn-sm" onclick="personAnlegen()">Anlegen</button>
        <button class="btn btn-ghost btn-sm" onclick="toggleAddCard()">Abbrechen</button>
      </div>
      <div class="error-msg" id="add-error"></div>
    </div>

    <button class="btn btn-ghost" id="add-toggle-btn" onclick="toggleAddCard()" style="width:100%;margin-bottom:16px">
      + Neue Person anlegen
    </button>

    <div class="section-title">Alle Personen</div>
    <div class="personen-list" id="personen-verwaltung"></div>
  </div>

  <!-- ── TAB: EXPORT ── -->
  <div class="panel content" id="tab-export">
    <br>
    <div class="monat-bar">
      <label>Monat</label>
      <input type="month" id="monat-input">
      <button class="btn btn-ghost btn-sm" onclick="exportLaden()">Laden</button>
    </div>

    <div id="export-result"></div>

    <br>
    <button class="btn btn-ghost" onclick="csvExport()" id="csv-btn" style="display:none;width:100%">
      Als CSV exportieren (für Excel / Numbers)
    </button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ══ KONFIGURATION ══════════════════════════════════════════
// HIER DIE WEB-APP-URL EINTRAGEN:
const API_URL = "https://script.google.com/macros/s/AKfycbwJK8mFx2iiSOkULx86TtW1QSGO67aC370kezSJdUGZWAkKrXrSjOqmH71Lf9RAk_UPRQ/exec";
// ════════════════════════════════════════════════════════════

// ── Demo-Modus (für lokale Designvorschau) ──
// Wird automatisch aktiviert wenn API_URL nicht gesetzt ist.
const DEMO_MODUS = API_URL.includes("HIER_");
const DEMO_PERSONEN = [
  { id:"P001", nachname:"Bauer",     vorname:"Lena",    position:"1. Kameraassistenz" },
  { id:"P002", nachname:"Fischer",   vorname:"Thomas",  position:"Regieassistenz" },
  { id:"P003", nachname:"Hoffmann",  vorname:"Clara",   position:"Maskenbild" },
  { id:"P004", nachname:"Klein",     vorname:"Jonas",   position:"Tonmeister" },
  { id:"P005", nachname:"Krause",    vorname:"Sophie",  position:"Kostümbild" },
  { id:"P006", nachname:"Lehmann",   vorname:"Felix",   position:"Beleuchter" },
  { id:"P007", nachname:"Meier",     vorname:"Anna",    position:"Aufnahmeleitung" },
  { id:"P008", nachname:"Müller",    vorname:"Hans",    position:"Kameramann" },
  { id:"P009", nachname:"Neumann",   vorname:"Sarah",   position:"Schnitt" },
  { id:"P010", nachname:"Peters",    vorname:"David",   position:"Regie" },
  { id:"P011", nachname:"Richter",   vorname:"Laura",   position:"Szenenbild" },
  { id:"P012", nachname:"Schmidt",   vorname:"Markus",  position:"Produzent" },
  { id:"P013", nachname:"Schneider", vorname:"Julia",   position:"2. Kameraassistenz" },
  { id:"P014", nachname:"Schulz",    vorname:"Lukas",   position:"Grip" },
  { id:"P015", nachname:"Wagner",    vorname:"Marie",   position:"Scriptgirl" },
  { id:"P016", nachname:"Weber",     vorname:"Stefan",  position:"Oberbeleuchter" },
  { id:"P017", nachname:"Werner",    vorname:"Kathrin", position:"Requisite" },
  { id:"P018", nachname:"Wolf",      vorname:"Daniel",  position:"Fahrer" },
];
const DEMO_ANWESEND = new Set(["P001","P003","P005","P007","P008","P010","P012","P014","P016"]);

// ── Namensformat-Hilfsfunktionen ──

// Anzeigename: "Nachname, Vorname"
function anzeigeName(p) {
  return p.vorname ? `${p.nachname}, ${p.vorname}` : p.nachname;
}

// Vollständige Anzeige mit Position
function anzeigeNamePos(p) {
  const name = anzeigeName(p);
  return p.position ? `${name} — ${p.position}` : name;
}

// Sortierung nach Nachname (dann Vorname)
function sortNachname(arr) {
  return arr.slice().sort((a, b) => {
    const n = a.nachname.localeCompare(b.nachname, 'de');
    if (n !== 0) return n;
    return (a.vorname || "").localeCompare(b.vorname || "", 'de');
  });
}

// Legacy: aus altem "Nachname, Vorname" oder "Vorname Nachname" String parsen
function parseNameString(str) {
  str = str.trim();
  if (str.includes(",")) {
    // "Nachname, Vorname" Format
    const [nach, vor] = str.split(",").map(s => s.trim());
    return { nachname: nach, vorname: vor || "" };
  }
  // Fallback: letztes Wort = Nachname
  const teile = str.split(" ");
  const nachname = teile.pop() || str;
  const vorname  = teile.join(" ");
  return { nachname, vorname };
}

let SESSION_PW = "";
let allePersonen = [];       // [{id, nachname, vorname, position}]
let anwesendHeute = new Set();
let geaendert = false;
let exportDaten = [];

// ── Hilfsfunktionen ──

function heute() {
  return new Date().toISOString().split("T")[0];
}

function formatDatum(d) {
  if (!d) return "";
  const [y,m,t] = d.split("-");
  return `${t}.${m}.${y}`;
}

function toast(msg, dauer = 2000) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), dauer);
}

async function api(action, extra = {}) {
  const body = { password: SESSION_PW, action, ...extra };
  const r = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(body),
    headers: { "Content-Type": "application/json" }
  });
  return r.json();
}

// ── Login ──

document.getElementById("pw-input").addEventListener("keydown", e => {
  if (e.key === "Enter") login();
});

async function login() {
  const pw = document.getElementById("pw-input").value.trim();
  if (!pw) return;
  const btn = document.getElementById("login-btn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Prüfe…';
  document.getElementById("login-error").textContent = "";

  SESSION_PW = pw;

  if (DEMO_MODUS) {
    // Demo: direkt einloggen
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").classList.add("active");
    allePersonen = sortNachname(DEMO_PERSONEN);
    anwesendHeute = new Set(DEMO_ANWESEND);
    heuteDatum();
    updateTopbar();
    renderListe();
    setSaveStatus("Demo-Modus aktiv", "");
    renderPersonenverwaltung();
    btn.disabled = false;
    btn.textContent = "Anmelden";
    return;
  }

  try {
    const res = await api("getPersonen");
    if (res.ok) {
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("app").classList.add("active");
      allePersonen = sortNachname(res.personen);
      heuteDatum();
      datumWechseln();
      renderPersonenverwaltung();
      updateTopbar();
    } else {
      document.getElementById("login-error").textContent = "Falsches Passwort";
      SESSION_PW = "";
    }
  } catch(e) {
    document.getElementById("login-error").textContent = "Verbindungsfehler. API-URL prüfen.";
    SESSION_PW = "";
  }
  btn.disabled = false;
  btn.textContent = "Anmelden";
}

function logout() {
  SESSION_PW = "";
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("app").classList.remove("active");
  document.getElementById("pw-input").value = "";
}

function updateTopbar() {
  const d = document.getElementById("datum-input").value;
  document.getElementById("topbar-date").textContent = d ? formatDatum(d) : "";
}

// ── Tabs ──

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById("tab-" + tab.dataset.tab).classList.add("active");
  });
});

// ── Anwesenheit ──

function heuteDatum() {
  document.getElementById("datum-input").value = heute();
}

async function datumWechseln() {
  const datum = document.getElementById("datum-input").value;
  if (!datum) return;
  updateTopbar();
  if (DEMO_MODUS) { renderListe(); return; }
  setSaveStatus("Lade…", "");
  anwesendHeute = new Set();
  geaendert = false;
  try {
    const res = await api("getTeilnahme", { datum });
    if (res.ok) anwesendHeute = new Set(res.anwesend);
  } catch(e) {}
  renderListe();
  setSaveStatus("Geladen", "");
}

function filtere() {
  renderListe();
}

function renderListe() {
  const suche = document.getElementById("suche").value.toLowerCase();
  const container = document.getElementById("personen-list");
  const gefiltert = suche
    ? allePersonen.filter(p =>
        p.nachname.toLowerCase().includes(suche) ||
        (p.vorname||"").toLowerCase().includes(suche) ||
        (p.position||"").toLowerCase().includes(suche))
    : allePersonen;

  // Alphabetische Buchstabengruppen
  let letzterBuchstabe = "";
  const html = gefiltert.map(p => {
    const an = anwesendHeute.has(p.id);
    const buchstabe = p.nachname[0].toUpperCase();
    let trennlinie = "";
    if (!suche && buchstabe !== letzterBuchstabe) {
      letzterBuchstabe = buchstabe;
      trennlinie = `<div style="font-family:var(--mono);font-size:11px;color:var(--border2);
        padding:10px 12px 4px;letter-spacing:0.1em">${buchstabe}</div>`;
    }
    return trennlinie + `<div class="person-row ${an ? 'checked' : ''}" onclick="toggle('${p.id}')">
      <div class="checkbox">${an ? '✓' : ''}</div>
      <div style="flex:1;min-width:0">
        <div class="person-name">
          <span style="font-weight:500">${p.nachname}</span><!--
          --><span style="color:var(--muted)">, ${p.vorname||''}</span>
        </div>
        ${p.position ? `<div style="font-size:12px;color:var(--muted);font-family:var(--mono);margin-top:1px">${p.position}</div>` : ''}
      </div>
    </div>`;
  }).join("");

  container.innerHTML = html || '<div style="color:var(--muted);font-size:13px;padding:12px">Keine Einträge gefunden.</div>';
  document.getElementById("count-anwesend").textContent = anwesendHeute.size;
  document.getElementById("count-gesamt").textContent = allePersonen.length;
}

function toggle(id) {
  if (anwesendHeute.has(id)) anwesendHeute.delete(id);
  else anwesendHeute.add(id);
  geaendert = true;
  setSaveStatus("Nicht gespeichert", "");
  renderListe();
}

function setSaveStatus(txt, cls) {
  const el = document.getElementById("save-status");
  el.textContent = txt;
  el.className = "save-status " + cls;
}

async function speichern() {
  const datum = document.getElementById("datum-input").value;
  if (!datum) { toast("Bitte Datum wählen"); return; }

  if (DEMO_MODUS) {
    geaendert = false;
    setSaveStatus(`✓ Demo — ${anwesendHeute.size} Personen`, "ok");
    toast(`Demo: ${anwesendHeute.size} Einträge`);
    return;
  }

  const btn = document.getElementById("save-btn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  const eintraege = allePersonen
    .filter(p => anwesendHeute.has(p.id))
    .map(p => ({
      id: p.id,
      name: p.vorname ? `${p.nachname}, ${p.vorname}` : p.nachname,
      abteilung: p.position || ""
    }));

  try {
    const res = await api("setTeilnahme", { datum, eintraege });
    if (res.ok) {
      geaendert = false;
      setSaveStatus(`✓ Gespeichert — ${res.gespeichert} Personen`, "ok");
      toast(`${res.gespeichert} Einträge gespeichert`);
    } else {
      setSaveStatus("Fehler: " + res.error, "err");
    }
  } catch(e) {
    setSaveStatus("Verbindungsfehler", "err");
  }
  btn.disabled = false;
  btn.textContent = "Speichern";
}

// ── Personenverwaltung ──

function renderPersonenverwaltung() {
  const container = document.getElementById("personen-verwaltung");
  if (allePersonen.length === 0) {
    container.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:12px 0">Noch keine Personen angelegt.</div>';
    return;
  }
  container.innerHTML = allePersonen.map(p => `
    <div class="person-row">
      <div style="flex:1;min-width:0">
        <div class="person-name">
          <span style="font-weight:500">${p.nachname}</span><span style="color:var(--muted)">, ${p.vorname||''}</span>
        </div>
        ${p.position ? `<div style="font-size:12px;color:var(--muted);font-family:var(--mono);margin-top:1px">${p.position}</div>` : ''}
      </div>
    </div>
  `).join("");
}

function toggleAddCard() {
  const card = document.getElementById("add-card");
  const btn = document.getElementById("add-toggle-btn");
  const open = card.classList.toggle("open");
  btn.textContent = open ? "× Abbrechen" : "+ Neue Person anlegen";
  if (open) document.getElementById("new-name").focus();
  document.getElementById("add-error").textContent = "";
}

document.getElementById("new-nachname").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("new-vorname").focus();
});
document.getElementById("new-vorname").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("new-abt").focus();
});
document.getElementById("new-abt").addEventListener("keydown", e => {
  if (e.key === "Enter") personAnlegen();
});

async function personAnlegen() {
  const nachname = document.getElementById("new-nachname").value.trim();
  const vorname  = document.getElementById("new-vorname").value.trim();
  const position = document.getElementById("new-abt").value.trim();
  if (!nachname) { document.getElementById("add-error").textContent = "Nachname erforderlich"; return; }

  const name = vorname ? `${nachname}, ${vorname}` : nachname;

  if (DEMO_MODUS) {
    const id = "P" + Date.now();
    allePersonen = sortNachname([...allePersonen, { id, nachname, vorname, position }]);
    document.getElementById("new-nachname").value = "";
    document.getElementById("new-vorname").value = "";
    document.getElementById("new-abt").value = "";
    document.getElementById("add-error").textContent = "";
    renderPersonenverwaltung();
    renderListe();
    toast(`${name} angelegt`);
    return;
  }

  try {
    const res = await api("addPerson", { name, abteilung: position });
    if (res.ok) {
      allePersonen = sortNachname([...allePersonen, { id: res.id, nachname, vorname, position }]);
      document.getElementById("new-nachname").value = "";
      document.getElementById("new-vorname").value = "";
      document.getElementById("new-abt").value = "";
      document.getElementById("add-error").textContent = "";
      renderPersonenverwaltung();
      renderListe();
      toast(`${name} angelegt`);
    } else {
      document.getElementById("add-error").textContent = res.error;
    }
  } catch(e) {
    document.getElementById("add-error").textContent = "Verbindungsfehler";
  }
}

// ── Import ──

function toggleImportCard() {
  const card = document.getElementById("import-card");
  const btn  = document.getElementById("import-toggle-btn");
  const open = card.classList.toggle("open");
  btn.textContent = open ? "× Importieren schließen" : "↓ Liste importieren (mehrere auf einmal)";
  if (open) {
    document.getElementById("import-text").focus();
    // Einzelne Person anlegen gleichzeitig schließen
    document.getElementById("add-card").classList.remove("open");
    document.getElementById("add-toggle-btn").textContent = "+ Neue Person anlegen";
  }
  document.getElementById("import-error").textContent = "";
  document.getElementById("import-preview").classList.remove("show");
  document.getElementById("import-text").value = "";
}

function parseImportZeilen(text) {
  return text.split("\n")
    .map(z => z.trim())
    .filter(z => z.length > 0)
    .map(z => {
      // Trennzeichen für Position: Tab oder Semikolon (nach dem Namen)
      let nameRoh, position = "";
      if (z.includes("\t")) {
        const teile = z.split("\t");
        nameRoh  = teile[0].trim();
        position = (teile[1] || "").trim();
      } else if (z.includes(";")) {
        const teile = z.split(";");
        nameRoh  = teile[0].trim();
        position = (teile[1] || "").trim();
      } else {
        nameRoh = z;
      }
      // Name parsen: "Nachname, Vorname" bevorzugt
      const { nachname, vorname } = parseNameString(nameRoh);
      return { nachname, vorname, position };
    })
    .filter(e => e.nachname.length > 0);
}

function importVorschau() {
  const text = document.getElementById("import-text").value;
  const zeilen = parseImportZeilen(text);
  const preview = document.getElementById("import-preview");
  const liste   = document.getElementById("import-preview-list");
  const summary = document.getElementById("import-summary");
  const btn     = document.getElementById("import-btn");

  if (zeilen.length === 0) {
    preview.classList.remove("show");
    btn.disabled = true;
    return;
  }

  const vorhandeneKeys = new Set(allePersonen.map(p =>
    `${p.nachname.toLowerCase()},${(p.vorname||"").toLowerCase()}`));
  let neuCount = 0, dupCount = 0;

  const rows = zeilen.map(e => {
    const key = `${e.nachname.toLowerCase()},${e.vorname.toLowerCase()}`;
    const dup = vorhandeneKeys.has(key);
    if (dup) dupCount++; else neuCount++;
    const cls = dup ? "dup" : "ok";
    const anzeige = e.vorname ? `${e.nachname}, ${e.vorname}` : e.nachname;
    return `<div class="preview-row ${cls}">
      <div class="preview-dot ${cls}"></div>
      <span>${anzeige}</span>
      ${e.position ? `<span style="color:var(--muted);font-family:var(--mono);font-size:12px">${e.position}</span>` : ""}
      ${dup ? '<span style="font-size:11px;color:var(--muted)">(bereits vorhanden)</span>' : ""}
    </div>`;
  }).join("");

  liste.innerHTML = rows;
  summary.textContent = `${neuCount} neu · ${dupCount} bereits vorhanden · ${zeilen.length} gesamt`;
  preview.classList.add("show");
  btn.disabled = neuCount === 0;
}

async function importDurchfuehren() {
  const text   = document.getElementById("import-text").value;
  const zeilen = parseImportZeilen(text);
  const vorhandeneKeys = new Set(allePersonen.map(p =>
    `${p.nachname.toLowerCase()},${(p.vorname||"").toLowerCase()}`));
  const neu = zeilen.filter(e => {
    const key = `${e.nachname.toLowerCase()},${e.vorname.toLowerCase()}`;
    return !vorhandeneKeys.has(key);
  });

  if (neu.length === 0) { toast("Keine neuen Personen"); return; }

  const btn = document.getElementById("import-btn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Importiere…';
  document.getElementById("import-error").textContent = "";

  let ok = 0, fehler = 0;

  if (DEMO_MODUS) {
    neu.forEach(e => {
      allePersonen.push({ id: "P"+Date.now()+ok, nachname: e.nachname, vorname: e.vorname, position: e.position });
      ok++;
    });
  } else {
    for (const e of neu) {
      try {
        const nameStr = e.vorname ? `${e.nachname}, ${e.vorname}` : e.nachname;
        const res = await api("addPerson", { name: nameStr, abteilung: e.position });
        if (res.ok) {
          allePersonen.push({ id: res.id, nachname: e.nachname, vorname: e.vorname, position: e.position });
          ok++;
        } else { fehler++; }
      } catch { fehler++; }
    }
  }

  allePersonen = sortNachname(allePersonen);
  renderPersonenverwaltung();
  renderListe();

  if (fehler === 0) {
    toast(`${ok} Personen importiert`);
    document.getElementById("import-card").classList.remove("open");
    document.getElementById("import-toggle-btn").textContent = "↓ Liste importieren (mehrere auf einmal)";
    document.getElementById("import-text").value = "";
    document.getElementById("import-preview").classList.remove("show");
  } else {
    document.getElementById("import-error").textContent = `${ok} importiert, ${fehler} Fehler`;
  }

  btn.disabled = false;
  btn.textContent = "Importieren";
}

// ── Export ──

// Aktuellen Monat vorausfüllen
document.getElementById("monat-input").value = heute().slice(0,7);

async function exportLaden() {
  const monat = document.getElementById("monat-input").value;
  if (!monat) return;
  const container = document.getElementById("export-result");
  container.innerHTML = '<div style="color:var(--muted);font-size:13px">Lade…</div>';
  document.getElementById("csv-btn").style.display = "none";

  try {
    const res = await api("exportMonat", { monat });
    if (!res.ok) { container.innerHTML = `<div style="color:var(--red)">${res.error}</div>`; return; }
    exportDaten = res.eintraege;

    if (exportDaten.length === 0) {
      container.innerHTML = '<div style="color:var(--muted);font-size:13px">Keine Einträge für diesen Monat.</div>';
      return;
    }

    // Alle Tage im Monat sammeln
    const alleTage = [...new Set(exportDaten.flatMap(e => e.tage))].sort();

    const header = `<tr>
      <th>Name</th>
      <th>Abt.</th>
      ${alleTage.map(t => `<th style="font-family:var(--mono);font-size:10px">${formatDatum(t).slice(0,5)}</th>`).join("")}
      <th>∑</th>
    </tr>`;

    const rows = exportDaten.map(e => `<tr>
      <td>${e.name}</td>
      <td style="color:var(--muted);font-family:var(--mono);font-size:12px">${e.abteilung}</td>
      ${alleTage.map(t => `<td style="text-align:center">${e.tage.includes(t) ? '<span style="color:var(--green)">✓</span>' : '<span style="color:var(--border2)">·</span>'}</td>`).join("")}
      <td><span class="anzahl-badge">${e.anzahl}</span></td>
    </tr>`).join("");

    container.innerHTML = `<div style="overflow-x:auto"><table class="export-table">${header}${rows}</table></div>`;
    document.getElementById("csv-btn").style.display = "block";

  } catch(e) {
    container.innerHTML = '<div style="color:var(--red)">Verbindungsfehler</div>';
  }
}

function csvExport() {
  if (!exportDaten.length) return;
  const alleTage = [...new Set(exportDaten.flatMap(e => e.tage))].sort();
  const header = ["Name", "Abteilung", ...alleTage, "Gesamt"].join(";");
  const rows = exportDaten.map(e => [
    `"${e.name}"`,
    `"${e.abteilung}"`,
    ...alleTage.map(t => e.tage.includes(t) ? "1" : "0"),
    e.anzahl
  ].join(";"));
  const csv = [header, ...rows].join("\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  const m = document.getElementById("monat-input").value;
  a.download = `catering_${m}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast("CSV exportiert");
}
